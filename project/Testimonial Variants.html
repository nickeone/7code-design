<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Testimonial Variants — 7Code</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #F8FAFC;
    color: #0F172A;
  }

  :root {
    --ink: #0F172A;
    --slate-700: #334155;
    --slate-500: #64748B;
    --slate-400: #94A3B8;
    --slate-300: #CBD5E1;
    --slate-200: #E2E8F0;
    --slate-100: #F1F5F9;
    --slate-50:  #F8FAFC;
    --cyan-300: #67E8F9;
    --cyan-400: #22D3EE;
    --cyan-500: #06B6D4;
    --cyan-600: #0891B2;
    --bg-cyan-50:  #ECFEFF;
    --bg-cyan-100: #CFFAFE;
    --radius: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    --font-display: "DM Sans", ui-sans-serif, system-ui, sans-serif;
    --font-body: "Inter", ui-sans-serif, system-ui, sans-serif;
    --shadow: 0 8px 24px -8px rgba(15,23,42,.08), 0 2px 6px -2px rgba(15,23,42,.04);
    --shadow-lg: 0 24px 48px -16px rgba(15,23,42,.14), 0 8px 16px -8px rgba(15,23,42,.06);
  }
</style>
<script>function initApollo(){var n=Math.random().toString(36).substring(7),o=document.createElement("script");o.src="https://assets.apollo.io/micro/website-tracker/tracker.iife.js?nocache="+n,o.async=!0,o.defer=!0,o.onload=function(){window.trackingFunctions.onLoad({appId:"6631de8c989bf4043a81bbc1"})},document.head.appendChild(o)}initApollo();</script>
</head>
<body>
<div id="root" style="height:100%"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const ITEMS = [
  {
    quote: "7Code became the engineering team we always wished we had. They turned a six-month roadmap into a six-week sprint — and the quality is exactly what we needed.",
    name: "Maria Petrescu",
    role: "VP Product",
    company: "NorthBank",
    initial: "M",
    tag: "Finance",
  },
  {
    quote: "What sets them apart is the strategic thinking. They didn't just build what we asked for — they helped us figure out what we actually needed to build.",
    name: "James Halloran",
    role: "Chief Technology Officer",
    company: "Helix Health",
    initial: "J",
    tag: "Healthcare",
  },
  {
    quote: "From discovery through launch, 7Code felt like a true partner. Communication was constant, decisions were transparent, and the product shipped on time.",
    name: "Sofia Andreescu",
    role: "Founder",
    company: "Atlas Energy",
    initial: "S",
    tag: "Energy",
  },
];

// ─── Shared atoms ─────────────────────────────────────────────────────
function Avatar({ initial, size = 52 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: 999,
      background: "linear-gradient(135deg, #22D3EE 0%, #0891B2 100%)",
      color: "#fff", display: "grid", placeItems: "center",
      fontFamily: "var(--font-display)", fontWeight: 700,
      fontSize: size * 0.32, flexShrink: 0,
    }}>{initial}</div>
  );
}

function PhotoSlot({ initial, size = 280 }) {
  return (
    <div style={{
      width: size, height: size * 1.2,
      borderRadius: "var(--radius-lg)",
      background: "var(--slate-100)",
      display: "flex", alignItems: "flex-end", justifyContent: "center",
      overflow: "hidden",
      position: "relative",
    }}>
      <div style={{
        position: "absolute", inset: 0,
        background: "radial-gradient(ellipse at 50% 30%, rgba(6,182,212,0.08) 0%, transparent 70%)",
      }}/>
      <div style={{
        fontFamily: "var(--font-display)", fontWeight: 700,
        fontSize: 96, color: "var(--slate-200)",
        lineHeight: 1, marginBottom: -16,
        position: "relative", zIndex: 1,
        userSelect: "none",
      }}>{initial}</div>
    </div>
  );
}

function Stars() {
  return (
    <div style={{ display: "flex", gap: 4 }}>
      {[...Array(5)].map((_, i) => (
        <svg key={i} width="18" height="18" viewBox="0 0 24 24" fill="#F59E0B">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
      ))}
    </div>
  );
}

function Tag({ label }) {
  return (
    <span style={{
      display: "inline-flex", alignItems: "center",
      padding: "4px 10px", borderRadius: 999,
      background: "var(--bg-cyan-50)",
      border: "1px solid var(--bg-cyan-100)",
      color: "var(--cyan-600)",
      fontSize: 11, fontWeight: 600,
      letterSpacing: "0.05em", textTransform: "uppercase",
    }}>{label}</span>
  );
}

function ArrowBtn({ dir = "right", onClick }) {
  return (
    <button onClick={onClick} style={{
      width: 40, height: 40, borderRadius: 999,
      background: "#fff", border: "1px solid var(--slate-200)",
      display: "grid", placeItems: "center",
      cursor: "pointer", transition: "all .15s",
    }}
      onMouseEnter={e => { e.currentTarget.style.background = "var(--ink)"; e.currentTarget.style.color = "#fff"; }}
      onMouseLeave={e => { e.currentTarget.style.background = "#fff"; e.currentTarget.style.color = "var(--ink)"; }}
    >
      {dir === "right"
        ? <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        : <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M11 19l-7-7 7-7"/></svg>
      }
    </button>
  );
}

function Dots({ count, active, setActive }) {
  return (
    <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
      {[...Array(count)].map((_, i) => (
        <span key={i} onClick={() => setActive(i)} style={{
          width: i === active ? 20 : 6, height: 6,
          borderRadius: 999, cursor: "pointer",
          background: i === active ? "var(--cyan-500)" : "var(--slate-300)",
          transition: "all .2s",
        }}/>
      ))}
    </div>
  );
}

// ─── Variant A: Split card — photo left, quote right ──────────────────
// Clean, editorial, balanced. 2-col card with photo + quote on opposite sides.
function VariantA() {
  const [idx, setIdx] = useState(0);
  const item = ITEMS[idx];
  return (
    <div style={{ width: 880, background: "#fff", border: "1px solid var(--slate-200)", borderRadius: "var(--radius-xl)", overflow: "hidden", display: "grid", gridTemplateColumns: "260px 1fr", boxShadow: "var(--shadow)" }}>
      {/* Photo col */}
      <div style={{ background: "var(--slate-50)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end", padding: "32px 24px 0", gap: 0, borderRight: "1px solid var(--slate-100)", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: 20, left: 20 }}>
          <Tag label={item.tag} />
        </div>
        <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at 50% 20%, rgba(6,182,212,0.07) 0%, transparent 60%)" }}/>
        <div style={{
          width: 180, height: 216,
          borderRadius: "var(--radius-lg) var(--radius-lg) 0 0",
          background: "var(--slate-200)",
          display: "flex", alignItems: "flex-end", justifyContent: "center",
          overflow: "hidden", position: "relative",
        }}>
          <span style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 80, color: "var(--slate-300)", lineHeight: 1, marginBottom: -10, position: "relative", zIndex: 1, userSelect: "none" }}>{item.initial}</span>
        </div>
      </div>

      {/* Quote col */}
      <div style={{ padding: "44px 48px", display: "flex", flexDirection: "column", justifyContent: "space-between", gap: 28, minHeight: 360 }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
          <Stars />
          <blockquote style={{ margin: 0, fontFamily: "var(--font-display)", fontSize: 22, fontWeight: 500, lineHeight: 1.45, letterSpacing: "-0.01em", color: "var(--ink)", textWrap: "pretty" }}>
            "{item.quote}"
          </blockquote>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <Avatar initial={item.initial} size={48} />
            <div>
              <div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 16, color: "var(--ink)" }}>{item.name}</div>
              <div style={{ fontSize: 13, color: "var(--slate-500)", marginTop: 2 }}>{item.role}, {item.company}</div>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", paddingTop: 16, borderTop: "1px solid var(--slate-100)" }}>
            <Dots count={ITEMS.length} active={idx} setActive={setIdx} />
            <div style={{ display: "flex", gap: 8 }}>
              <ArrowBtn dir="left" onClick={() => setIdx(i => (i - 1 + ITEMS.length) % ITEMS.length)} />
              <ArrowBtn dir="right" onClick={() => setIdx(i => (i + 1) % ITEMS.length)} />
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Variant B: Stack of mini-cards (all visible at once) ─────────────
// Calm, minimal, shows all testimonials. No slider — all cards visible.
// Active is highlighted slightly.
function VariantB() {
  const [active, setActive] = useState(0);
  return (
    <div style={{ width: 880, display: "flex", flexDirection: "column", gap: 12 }}>
      {ITEMS.map((item, i) => (
        <div key={i} onClick={() => setActive(i)} style={{
          background: i === active ? "#fff" : "#fff",
          border: `1px solid ${i === active ? "var(--cyan-500)" : "var(--slate-200)"}`,
          borderRadius: "var(--radius-lg)",
          padding: i === active ? "28px 32px" : "20px 32px",
          display: "grid",
          gridTemplateColumns: i === active ? "1fr auto" : "auto 1fr auto",
          gap: 20,
          alignItems: "center",
          cursor: "pointer",
          transition: "all .25s",
          boxShadow: i === active ? "0 8px 24px -8px rgba(6,182,212,0.2)" : "none",
        }}>
          {i !== active && <Avatar initial={item.initial} size={40} />}
          <div>
            {i === active && (
              <>
                <Stars />
                <blockquote style={{ margin: "12px 0 16px", fontFamily: "var(--font-display)", fontSize: 22, fontWeight: 500, lineHeight: 1.45, letterSpacing: "-0.01em", color: "var(--ink)" }}>
                  "{item.quote}"
                </blockquote>
              </>
            )}
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              {i === active && <Avatar initial={item.initial} size={44} />}
              <div>
                <div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: i === active ? 15 : 14, color: "var(--ink)" }}>{item.name}</div>
                <div style={{ fontSize: 13, color: "var(--slate-500)", marginTop: 2 }}>{item.role}, {item.company}</div>
              </div>
            </div>
          </div>
          <Tag label={item.tag} />
        </div>
      ))}
    </div>
  );
}

// ─── Variant C: Magazine pull-quote — big, asymmetric, bold type ──────
// Asymmetric layout: huge quote number + pull quote on left, narrow
// author column + photo tile on right. Very editorial.
function VariantC() {
  const [idx, setIdx] = useState(0);
  const item = ITEMS[idx];
  return (
    <div style={{ width: 880, position: "relative" }}>
      {/* Subtle cyan strip at top */}
      <div style={{ height: 3, background: "linear-gradient(90deg, var(--cyan-500) 0%, var(--cyan-300) 60%, transparent 100%)", borderRadius: "3px 3px 0 0" }}/>
      <div style={{ background: "#fff", border: "1px solid var(--slate-200)", borderTop: "none", borderRadius: "0 0 var(--radius-xl) var(--radius-xl)", padding: "48px 56px", display: "grid", gridTemplateColumns: "1fr 220px", gap: 48, boxShadow: "var(--shadow)" }}>

        {/* Left: quote */}
        <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
          <div style={{ fontFamily: "Georgia, serif", fontSize: 120, lineHeight: 0.8, color: "var(--slate-100)", userSelect: "none", marginLeft: -8 }}>&ldquo;</div>
          <blockquote style={{ margin: "-32px 0 0", fontFamily: "var(--font-display)", fontSize: 24, fontWeight: 500, lineHeight: 1.4, letterSpacing: "-0.015em", color: "var(--ink)", textWrap: "pretty" }}>
            {item.quote}
          </blockquote>
          <div style={{ display: "flex", alignItems: "center", gap: 12, paddingTop: 24, borderTop: "1px solid var(--slate-100)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ display: "flex", gap: 6 }}>
                <ArrowBtn dir="left" onClick={() => setIdx(i => (i - 1 + ITEMS.length) % ITEMS.length)} />
                <ArrowBtn dir="right" onClick={() => setIdx(i => (i + 1) % ITEMS.length)} />
              </div>
              <Dots count={ITEMS.length} active={idx} setActive={setIdx} />
            </div>
            <span style={{ marginLeft: "auto", fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 13, color: "var(--slate-400)", letterSpacing: "0.04em" }}>
              {String(idx + 1).padStart(2, "0")} — {String(ITEMS.length).padStart(2, "0")}
            </span>
          </div>
        </div>

        {/* Right: photo + name */}
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
          <div style={{
            width: 220, height: 264,
            borderRadius: "var(--radius-lg)",
            background: "var(--slate-50)",
            border: "1px solid var(--slate-200)",
            display: "flex", alignItems: "flex-end", justifyContent: "center",
            overflow: "hidden", position: "relative",
          }}>
            <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at 50% 20%, rgba(6,182,212,0.08) 0%, transparent 60%)" }}/>
            <span style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 80, color: "var(--slate-200)", lineHeight: 1, marginBottom: -12, position: "relative", zIndex: 1, userSelect: "none" }}>{item.initial}</span>
          </div>
          <div style={{ textAlign: "center" }}>
            <Stars />
            <div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 16, color: "var(--ink)", marginTop: 10 }}>{item.name}</div>
            <div style={{ fontSize: 13, color: "var(--slate-500)", marginTop: 3 }}>{item.role}</div>
            <Tag label={item.company} />
          </div>
        </div>

      </div>
    </div>
  );
}

// ─── Canvas ───────────────────────────────────────────────────────────
function App() {
  return (
    <DesignCanvas title="Testimonial Variants — 7Code">
      <DCSection id="a" title="A — Split card (photo + quote)">
        <DCArtboard id="a1" label="Split card" width={880} height={360}>
          <div style={{ padding: 0 }}>
            <VariantA />
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="b" title="B — Accordion stack (all visible)">
        <DCArtboard id="b1" label="Accordion stack" width={880} height={360}>
          <div style={{ padding: 0 }}>
            <VariantB />
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="c" title="C — Magazine pull-quote (bold typography)">
        <DCArtboard id="c1" label="Pull-quote" width={880} height={420}>
          <div style={{ padding: 0 }}>
            <VariantC />
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
